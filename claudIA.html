<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Jottacloud Catcher — 8-bit</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf6ec;
    --ink:#2a2540;
    --ink-soft:#5b5278;
    --accent:#7a6cff;
    --accent2:#ff8fb1;
    --ok:#6bd4a1;
    --warn:#ffb454;
    --bad:#ff5e7a;
    --cream:#fff5e1;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;padding:0;height:100%;
    background: radial-gradient(ellipse at top,#ffe7f0 0%,#fdf6ec 60%,#e7eaff 100%);
    color:var(--ink);
    font-family: "Press Start 2P", ui-monospace, Menlo, Consolas, monospace;
    overflow:hidden;
    -webkit-font-smoothing: antialiased;
  }
  body{display:flex;align-items:center;justify-content:center}
  .wrap{
    position:relative;
    width:min(96vw, calc(96vh * 4 / 3));
    aspect-ratio: 4 / 3;
    background:#000;
    border-radius:14px;
    box-shadow: 0 24px 60px rgba(40,30,90,.18), inset 0 0 0 6px #ffffff, 0 0 0 1px rgba(0,0,0,.06);
    overflow:hidden;
    user-select:none;
  }
  canvas{
    width:100%;height:100%;
    display:block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background:#222;
  }

  /* HUD overlay */
  .hud{
    position:absolute; top:0; left:0; right:0;
    padding:10px 14px;
    display:grid; grid-template-columns: 1fr auto 1fr; align-items:center;
    gap:10px;
    color:var(--ink);
    background: linear-gradient(to bottom, rgba(255,255,255,.85), rgba(255,255,255,.65) 80%, rgba(255,255,255,0));
    pointer-events:none;
    font-size: clamp(8px, 1.2vw, 12px);
    letter-spacing: .05em;
  }
  .hud .tier{ justify-self:start; }
  .hud .tb  { justify-self:end; }
  .hud .bar-wrap{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    min-width: 200px;
  }
  .hud .bar-label{
    font-size: 9px; color:var(--ink-soft); letter-spacing:.18em;
  }
  .hud .bar{
    position:relative;
    width: clamp(160px, 26vw, 260px);
    height: 14px;
    background: #efe7d4;
    border: 2px solid var(--ink);
    border-radius: 0;
    overflow:hidden;
  }
  .hud .bar-fill{
    height:100%; width:0%;
    background: var(--ok);
    transition: width .15s linear, background-color .25s linear;
  }
  .hud .bar-fill.indeterminate{
    width:100% !important;
    background: linear-gradient(90deg,
      rgba(122,108,255,.15) 0%,
      rgba(107,212,161,.85) 35%,
      rgba(255,143,177,.85) 50%,
      rgba(107,212,161,.85) 65%,
      rgba(122,108,255,.15) 100%);
    background-size: 220% 100%;
    animation: shimmer 2.4s linear infinite;
    transition:none;
  }
  @keyframes shimmer {
    0%   { background-position: 220% 0; }
    100% { background-position: -220% 0; }
  }
  .hud .bar-fill.pulse{
    filter: brightness(1.5) saturate(1.4);
    transition: filter .25s ease-out;
  }
  .hud .bar-tick{
    position:absolute; top:-3px; bottom:-3px; width:2px;
    background: var(--ink);
  }

  /* Dialog overlay */
  .dialog{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(20,15,40,.45);
    pointer-events:auto;
  }
  .dialog.hidden{ display:none }
  .dialog .card{
    background: var(--cream);
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 rgba(20,15,40,.25);
    padding: clamp(14px, 2.6vw, 26px) clamp(16px, 3vw, 32px);
    max-width: 78%;
    text-align:center;
    color:var(--ink);
    line-height: 1.5;
  }
  .dialog h1{
    margin:0 0 10px;
    font-size: clamp(14px, 2.4vw, 22px);
    color: var(--accent);
    letter-spacing:.06em;
  }
  .dialog h1.bad{ color: var(--bad); }
  .dialog .sub{
    font-size: clamp(8px, 1.2vw, 11px);
    color: var(--ink-soft);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .dialog .opts{
    display:flex; flex-direction:column; gap:6px; margin-top: 14px;
  }
  .dialog .opt{
    font-size: clamp(9px, 1.4vw, 13px);
    padding: 10px 14px;
    background: #f5edd9;
    border: 2px solid transparent;
    cursor:pointer;
    text-align:center;
    color: var(--ink);
  }
  .dialog .opt .sub2{
    display:block;
    font-size: 8px;
    color: var(--ink-soft);
    margin-top:4px;
    letter-spacing:.04em;
  }
  .dialog .opt.sel{
    background: #ffe7f0;
    border-color: var(--accent);
  }
  .dialog .opt.sel::before{ content:"> "; color: var(--accent); }
  .dialog .opt.subtle{
    background: transparent;
    font-size: clamp(8px, 1.1vw, 10px);
    color: var(--ink-soft);
    margin-top: 6px;
    padding: 8px;
  }
  .dialog .opt.subtle.sel{
    background: #f5edd9;
    color: var(--ink);
  }
  .dialog a{ color: var(--accent); text-decoration: underline; }
  .dialog .footer{
    margin-top: 16px;
    font-size: 8px;
    color: var(--ink-soft);
    letter-spacing:.1em;
  }
  .countdown-num{
    font-size: clamp(60px, 10vw, 110px);
    color:#fff;
    text-shadow: 4px 4px 0 rgba(20,15,40,.6);
    margin: 0;
    line-height:1;
  }
  .countdown-sub{
    color:#fff;
    font-size: clamp(10px, 1.6vw, 14px);
    letter-spacing:.2em;
    margin-top:10px;
  }

  /* Hint */
  .hint{
    position:absolute;
    bottom:0; left:0; right:0;
    text-align:center;
    font-size: 10px;
    color: #fff5e1;
    background: rgba(20,15,40,.75);
    padding: 8px 12px;
    letter-spacing: .14em;
    pointer-events:none;
    text-transform:uppercase;
    line-height: 1;
  }
  .hint .arrow{
    display:inline-block;
    font-size: 18px;
    line-height: 1;
    transform: translateY(2px);
    color:#fff;
    margin: 0 1px;
  }
  .hint .key{
    color:#ffd968;
    margin: 0 2px;
  }
  .hint.dark{ color:#fff; opacity:.7 }

  /* Touch buttons */
  .touch{
    position:absolute;inset:auto 0 0 0;
    display:flex;justify-content:space-between;
    padding:8px;
    pointer-events:none;
    opacity:0;
  }
  .touch button{
    pointer-events:auto;
    width:25%;height:80px;
    background:rgba(255,255,255,.18);
    border:2px solid rgba(255,255,255,.4);
    color:#fff;
    font-family:inherit;font-size:24px;
    border-radius:10px;
  }
  .touch .pause-btn{ width:80px; height:48px; font-size:11px; align-self:flex-end }
  @media (hover:none) and (pointer:coarse){
    .touch{opacity:1}
    .hint{display:none}
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <canvas id="game" width="320" height="240"></canvas>

  <div class="hud" id="hud" hidden>
    <div class="tier" id="tierName">HOME • 1 TB</div>
    <div class="bar-wrap">
      <div class="bar-label" id="barLabel">STORAGE</div>
      <div class="bar" id="bar">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
    <div class="tb" id="tbValue">0.00 TB</div>
  </div>

  <div class="dialog" id="dialog">
    <div class="card" id="dialogCard"></div>
  </div>

  <div class="touch">
    <button id="btnL" aria-label="left">◀</button>
    <button id="btnPause" class="pause-btn">PAUSE</button>
    <button id="btnR" aria-label="right">▶</button>
  </div>
  <div class="hint" id="hint">
    <span class="arrow">◄</span><span class="arrow">►</span>
    <span class="key">MOVE</span> •
    <span class="key">ENTER</span> PAUSE •
    <span class="key">SPACE</span> SELECT
  </div>
</div>

<script>
(() => {
  // ---------- Setup ----------
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = cv.width, H = cv.height;

  const hud = document.getElementById('hud');
  const tierEl = document.getElementById('tierName');
  const tbEl = document.getElementById('tbValue');
  const barEl = document.getElementById('bar');
  const barFill = document.getElementById('barFill');
  const barLabel = document.getElementById('barLabel');
  const dialog = document.getElementById('dialog');
  const card = document.getElementById('dialogCard');
  const hintEl = document.getElementById('hint');

  // ---------- Palette ----------
  const PAL = {
    ink:'#2a2540', inkSoft:'#5b5278', white:'#ffffff', cream:'#fff5e1',
    shadow:'rgba(20,15,40,.35)',
    photoFrame:'#ffffff', photoSky:'#9bd3ff', photoHill:'#7ad19c', photoSun:'#ffd968',
    folderBack:'#e69b3a', folderFront:'#ffc36a', folderTab:'#ffd98a',
    docBody:'#ffffff', docLine:'#bdb6d6', docCorner:'#e3deef',
    videoBody:'#3a3358', videoReel:'#1c1830', videoHole:'#7a6cff', videoLight:'#ffd968',
    copyBody:'#ff5e7a', copyDark:'#a8324a', copyText:'#ffffff',
    cloud:'#ffffff', cloudShade:'#dcd4f0', cloudOutline:'#2a2540',
    cloudRed:'#ff5e7a', cloudRedShade:'#c93f5f',
    rain:'#7ec6ff',
    welcomeBg:'#e7eaff',
    livingWall:'#fbe1d6', livingFloor:'#e9b89c', livingSofa:'#ff8fb1', livingSofaShade:'#d96b8e',
    livingLamp:'#ffd968', livingFrame:'#7a6cff',
    officeWall:'#d8efe5', officeFloor:'#9fc8b9', officeDesk:'#c08a5b', officeDeskShade:'#8a5f3b',
    officeMonitor:'#2a2540', officePlant:'#6bd4a1', officePot:'#b07b53', officeChair:'#5b5278',
    mountSky1:'#cfe7ff', mountSky2:'#ffe2f0', mountSnow:'#ffffff', mountRock:'#9aa6c4', mountRockDk:'#6b779a',
    mountLake:'#7ec6ff', mountLake2:'#bde2ff', mountTree:'#5fa380', mountGround:'#bfd9b1',
    mountMid:'#dfe9ff', // mid-band sky used to fill below gradient
  };

  // ---------- Audio ----------
  let audioCtx = null;
  function initAudio(){
    if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ audioCtx = null; }
  }
  function tone(freq, dur, type='square', vol=0.10) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0008, t + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  }
  function bleepCatch(type) {
    // little chiptune blip — slight pitch by file type
    const base = { photo:880, folder:1175, document:587, video:988 }[type] || 880;
    tone(base,        0.06, 'square', 0.10);
    tone(base * 1.5,  0.05, 'square', 0.07);
  }
  function bleepSad() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(440, t);
    osc.frequency.exponentialRampToValueAtTime(90, t + 0.55);
    gain.gain.setValueAtTime(0.14, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.65);
  }
  // Initialize audio on the first interaction with the page
  ['pointerdown','keydown','touchstart'].forEach(ev =>
    window.addEventListener(ev, initAudio, {once:false})
  );

  // ---------- Input ----------
  const keys  = {left:false,right:false};   // cloud 1 (arrows)
  const keys2 = {left:false,right:false};   // cloud 2 (WASD, multiplayer only)
  let leftPresses = 0, rightPresses = 0;    // for unlimited slowdown (cloud 1)

  document.addEventListener('keydown', e => {
    initAudio();
    if (e.repeat) return;
    if (e.code === 'ArrowLeft')  { keys.left  = true; leftPresses++; }
    if (e.code === 'ArrowRight') { keys.right = true; rightPresses++; }
    if (e.code === 'KeyA') {
      if (isMulti()) keys2.left = true;
      else { keys.left = true; leftPresses++; }
    }
    if (e.code === 'KeyD') {
      if (isMulti()) keys2.right = true;
      else { keys.right = true; rightPresses++; }
    }
    if (e.code === 'Enter') { handleEnter(); e.preventDefault(); return; }
    if (e.code === 'Space')  { handleSpace(); e.preventDefault(); return; }
    if (e.code === 'ArrowUp') uiNav(-1);
    if (e.code === 'ArrowDown') uiNav(1);
    // W/S for menu nav only when not playing
    if (e.code === 'KeyW' && game.state !== STATE.PLAY) uiNav(-1);
    if (e.code === 'KeyS' && game.state !== STATE.PLAY) uiNav(1);
    if (e.code === 'Escape') {
      if (game.state === STATE.PLAY)  togglePause();
      else if (game.state === STATE.PAUSE) togglePause();   // quick-resume
    }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter'].includes(e.code)) e.preventDefault();
  }, {passive:false});
  document.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft')  keys.left  = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'KeyA') { if (isMulti()) keys2.left = false; else keys.left = false; }
    if (e.code === 'KeyD') { if (isMulti()) keys2.right = false; else keys.right = false; }
  });
  // touch
  const btnL = document.getElementById('btnL'), btnR = document.getElementById('btnR');
  const btnPause = document.getElementById('btnPause');
  const press = (k,v) => { keys[k]=v; if(v){ if(k==='left')leftPresses++; else rightPresses++; } };
  ['pointerdown','pointerup','pointerleave','pointercancel'].forEach(ev=>{
    btnL.addEventListener(ev, e => press('left',  ev==='pointerdown'));
    btnR.addEventListener(ev, e => press('right', ev==='pointerdown'));
  });
  btnPause.addEventListener('click', e => { if (game.state === STATE.PLAY) togglePause(); else if (game.state === STATE.PAUSE) togglePause(); });

  function handleEnter(){
    // Enter pauses during gameplay; on every dialog (including pause) it confirms.
    // Esc is the quick-resume shortcut from pause.
    if (game.state === STATE.PLAY) { togglePause(); return; }
    uiSelect();
  }
  function handleSpace(){ uiSelect(); }

  // ---------- States ----------
  const STATE = {
    WELCOME:'welcome', COUNTDOWN:'countdown', PLAY:'play',
    PAUSE:'pause', FULL:'full', UPGRADE:'upgrade', CALL_CS:'call_cs',
    SUBHELP:'subhelp'
  };
  const TIERS = {
    home:      { name:'HOME • 1 TB',          limitTB:1,        bg:'living', multi:false },
    home5:     { name:'HOME • 5 TB (family)', limitTB:5,        bg:'living', multi:true  },
    pro:       { name:'PRO • 10 TB',          limitTB:10,       bg:'office', multi:false },
    unlimited: { name:'UNLIMITED',            limitTB:Infinity, bg:'mountain', multi:false },
  };
  const POINTS_PER_TB = 100;

  let game = freshGame();
  function freshGame() {
    return {
      state: STATE.WELCOME,
      welcomeIndex: 0, promptIndex: 0,
      tier: null,
      score: 0,
      countdown: 5, countdownT: 0,
      time: 0,
      cloud:  { x: W/2 - 16, y: H - 36, w: 32, h: 16, speed: 1.6,
                frozen:false, freezeT:0, happyT:0 },
      cloud2: null, // populated when tier is multiplayer (home5)
      files: [],
      spawnT: 0,
      spawnEvery: 0.55,
      gravity: 28,
      shownUnlimitedUpgrade: false,
      switchedToPro: false,
      sparkles: [],
      rainDrops: [],
    };
  }
  function isMulti(){ return game.tier && TIERS[game.tier] && TIERS[game.tier].multi; }

  // weights sum to 100. (Original ratios 50/30/10/10 preserved within ~3% noise budget.)
  const FILES = [
    { type:'photo',     points:5,  weight:48, w:14, h:12 },
    { type:'folder',    points:20, weight:29, w:18, h:14 },
    { type:'document',  points:1,  weight:10, w:12, h:14 },
    { type:'video',     points:10, weight:9,  w:18, h:14 },
    { type:'copyright', points:0,  weight:4,  w:14, h:14, bad:true },
  ];
  function pickFile() {
    const r = Math.random()*100;
    let acc = 0;
    for (const f of FILES) { acc += f.weight; if (r < acc) return f; }
    return FILES[0];
  }

  // ---------- Drawing helpers ----------
  function rect(x,y,w,h,c){ ctx.fillStyle = c; ctx.fillRect(x|0,y|0,w|0,h|0); }
  function blend(a,b,t){
    const A = hex(a), B = hex(b);
    return `rgb(${(A.r+(B.r-A.r)*t)|0},${(A.g+(B.g-A.g)*t)|0},${(A.b+(B.b-A.b)*t)|0})`;
  }
  function hex(h){
    const m = h.replace('#','');
    return { r:parseInt(m.slice(0,2),16), g:parseInt(m.slice(2,4),16), b:parseInt(m.slice(4,6),16) };
  }

  // ---------- Backgrounds (full-coverage base, then decorations) ----------
  function drawBackground(kind) {
    if (kind === 'living')   drawLiving();
    else if (kind === 'office') drawOffice();
    else                     drawMountain();
  }

  function drawLiving() {
    rect(0,0,W,H, PAL.livingWall);             // full base
    rect(0,H*0.7,W,H*0.3, PAL.livingFloor);    // floor
    for (let i=0;i<W;i+=16) rect(i, H*0.7, 1, H*0.3, '#d6a283');
    rect(40,30,60,40, PAL.livingFrame);
    rect(44,34,52,32, '#cfe7ff');
    rect(64,42,16,16, PAL.livingLamp);
    rect(80,50,8,4, '#ffe9a8');
    rect(170,140,110,40, PAL.livingSofa);
    rect(170,140,110,8,  PAL.livingSofaShade);
    rect(170,140,8,40,   PAL.livingSofaShade);
    rect(272,140,8,40,   PAL.livingSofaShade);
    rect(180,150,28,20, '#ffd2dd');
    rect(216,150,28,20, '#ffd2dd');
    rect(252,150,20,20, '#ffd2dd');
    rect(120,40,4,90, '#9b8da6');
    rect(108,28,28,16, PAL.livingLamp);
    rect(110,30,24,12, '#ffe9a8');
    rect(112,128,20,4, '#9b8da6');
    rect(20,150,16,20,'#b07b53');
    rect(18,138,20,12, PAL.officePlant);
    rect(22,132,4,8, PAL.officePlant);
    rect(30,134,4,6, PAL.officePlant);
  }

  function drawOffice() {
    rect(0,0,W,H, PAL.officeWall);             // full base
    rect(0,H*0.7,W,H*0.3, PAL.officeFloor);
    rect(0,H*0.7-2,W,2, '#b9d8ca');

    // Rug on the floor
    const rugY = 196;
    rect(60, rugY, 200, 30, '#a8c2d6');           // outer rug
    rect(64, rugY+2, 192, 26, '#7c9bbc');         // border
    rect(72, rugY+6, 176, 18, '#c9d9e6');         // inner field
    // rug pattern (diamonds)
    for (let i = 80; i < 240; i += 20) {
      rect(i, rugY+10, 6, 2, '#7c9bbc');
      rect(i-2, rugY+12, 10, 2, '#7c9bbc');
      rect(i, rugY+14, 6, 2, '#7c9bbc');
    }
    // rug fringe
    for (let i = 60; i < 260; i += 4) {
      rect(i, rugY-2, 2, 2, '#a8c2d6');
      rect(i, rugY+30, 2, 2, '#a8c2d6');
    }

    // Window
    rect(170,22,72,40, '#cfe7ff');
    rect(170,22,72,2, PAL.inkSoft);
    rect(170,60,72,2, PAL.inkSoft);
    rect(206,22,2,40, PAL.inkSoft);

    // Desk
    rect(30,140,160,8, PAL.officeDesk);
    rect(30,148,8,40, PAL.officeDeskShade);
    rect(182,148,8,40,PAL.officeDeskShade);

    // Monitor
    rect(70,108,60,36, PAL.officeMonitor);
    rect(74,112,52,28, '#7a6cff');
    rect(78,118,20,2,'#fff5e1');
    rect(78,124,32,2,'#fff5e1');
    rect(78,130,16,2,'#fff5e1');
    rect(94,140,12,4, PAL.officeMonitor);

    // Chair
    rect(140,160,20,28, PAL.officeChair);
    rect(140,180,20,4, '#3b3552');
    rect(148,188,4,12,  '#3b3552');

    // Plant on desk
    rect(155,128,12,14, PAL.officePot);
    rect(150,114,22,16, PAL.officePlant);
    rect(158,106,4,10,  PAL.officePlant);
    rect(164,110,4,8,   PAL.officePlant);

    // Right-corner shelf
    const shelfX = 252, shelfY = 92;
    rect(shelfX, shelfY+2, 56, 3, '#7a5a3a');     // shelf bracket shadow
    rect(shelfX, shelfY,   56, 3, '#a37a4d');     // shelf top
    rect(shelfX+2, shelfY-1, 2, 1, '#7a5a3a');    // L bracket
    rect(shelfX+50,shelfY-1, 2, 1, '#7a5a3a');

    // Camera on the shelf
    const camX = shelfX + 18, camY = shelfY - 14;
    // body
    rect(camX,    camY+4,   24, 10, '#2a2540');
    rect(camX,    camY+3,   24, 1,  '#3b3552');
    rect(camX+2,  camY+13,  20, 1,  '#1a162e');
    // top hump (viewfinder)
    rect(camX+6,  camY,     10, 4, '#2a2540');
    rect(camX+8,  camY-1,   6,  1, '#3b3552');
    // shutter button
    rect(camX+18, camY,     3, 2,  '#ff5e7a');
    // lens

  function drawMountain() {
    // Sunset / never-ending horizon
    const horizonY = 140;

    // Sky gradient: deep purple → coral → warm orange near horizon
    for (let y=0;y<horizonY;y++){
      const t = y / horizonY;
      let c;
      if (t < 0.35)      c = blend('#3a3370', '#7a6cff', t / 0.35);
      else if (t < 0.65) c = blend('#7a6cff', '#ff8fb1', (t - 0.35) / 0.30);
      else if (t < 0.88) c = blend('#ff8fb1', '#ffb454', (t - 0.65) / 0.23);
      else               c = blend('#ffb454', '#ffd968', (t - 0.88) / 0.12);
      rect(0, y, W, 1, c);
    }

    // Sun on horizon (centered, layered glow)
    const cx = (W/2)|0;
    const sunY = horizonY - 22;
    // glow halo
    rect(cx-22, sunY+2, 44, 16, 'rgba(255,217,104,0.25)');
    rect(cx-16, sunY-2, 32, 22, 'rgba(255,217,104,0.45)');
    // sun disc
    rect(cx-10, sunY,    20, 4, '#ffe7a3');
    rect(cx-12, sunY+4,  24, 8, '#ffd968');
    rect(cx-10, sunY+12, 20, 4, '#ffb454');

    // Soft horizon haze line
    rect(0, horizonY-1, W, 1, 'rgba(255,180,84,0.55)');

    // Side mountains only — leave middle open for the horizon
    // Left cluster (silhouettes, dark)
    drawTri(-12, horizonY,  74, 72, '#2a2540');
    drawTri( 18, horizonY,  56, 56, '#3b3552');
    drawTri( 50, horizonY,  44, 36, '#4d4669');
    // Right cluster
    drawTri(W-62, horizonY, 74, 72, '#2a2540');
    drawTri(W-78, horizonY, 56, 56, '#3b3552');
    drawTri(W-94, horizonY, 44, 36, '#4d4669');

    // Water — darker blue
    const waterTop = horizonY;
    rect(0, waterTop, W, H - waterTop, '#1f4e8c');
    // Subtle deeper band toward bottom
    rect(0, waterTop + 30, W, H - (waterTop + 30), '#173d72');

    // Sun reflection (warm streak shimmering down)
    for (let y = waterTop; y < H; y += 2) {
      const dy = y - waterTop;
      const ww = Math.max(2, 20 - dy / 3);
      const col = dy < 18 ? '#ffd968' : (dy < 36 ? '#ffb454' : '#ff8fb1');
      // alternating dashes to feel watery
      if (((y + (dy>>1)) & 3) !== 0) {
        rect(cx - (ww/2)|0, y, ww|0, 1, col);
      }
    }

    // Water highlight ripples
    for (let y = waterTop + 6; y < H; y += 8) {
      rect(0, y, W, 1, 'rgba(180,210,255,0.15)');
    }
  }
  function drawTri(x,y,w,h,c){
    // Upward-pointing triangle: base of width w sits ON the line y, apex is at y - h.
    ctx.fillStyle = c;
    for (let i=0;i<h;i++){
      const span = ((i+1)/h) * w;
      ctx.fillRect((x + (w-span)/2)|0, (y - h + i)|0, Math.max(1, span|0), 1);
    }
  }

  // ---------- Spawn / Update ----------
  function spawn() {
    const def = pickFile();
    const x = 4 + Math.random() * (W - def.w - 8);
    const speedMul = 1 + Math.min(2.0, game.score / (POINTS_PER_TB * 4));
    game.files.push({
      type: def.type, points: def.points, bad: !!def.bad,
      x, y: -def.h - 2, w: def.w, h: def.h,
      vy: (game.gravity + Math.random()*20) * speedMul / 60,
    });
  }

  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt) {
    game.time += dt;

    if (game.state === STATE.PLAY) {
      // Decrement per-cloud timers
      tickCloud(game.cloud, dt);
      if (game.cloud2) tickCloud(game.cloud2, dt);

      // Movement (slowed/blocked while frozen)
      if (!game.cloud.frozen) moveCloud1(dt);
      if (game.cloud2 && !game.cloud2.frozen) moveCloud2(dt);

      const limit = currentLimitTB() === Infinity ? null : currentLimitTB() * POINTS_PER_TB;
      const isFull = (limit !== null) && game.score >= limit;

      // Spawn
      game.spawnT += dt;
      const spawnRate = Math.max(0.22, game.spawnEvery - game.score/2400);
      if (game.spawnT > spawnRate) { game.spawnT = 0; spawn(); }

      for (const f of game.files) f.y += f.vy * 60 * dt;

      // Collisions: parent cloud first, then child cloud
      const clouds = [game.cloud];
      if (game.cloud2) clouds.push(game.cloud2);

      for (const f of game.files) {
        if (f.dead) continue;
        for (const c of clouds) {
          if (c.frozen) continue;
          const hit =
            f.y + f.h > c.y + 4 &&
            f.y      < c.y + c.h - 2 &&
            f.x + f.w > c.x + 2 &&
            f.x      < c.x + c.w - 2;
          if (hit) {
            if (f.bad) {
              c.frozen = true; c.freezeT = 2.0; c.happyT = 0;
              spawnRain(20, c);
              bleepSad();
            } else if (!isFull) {
              game.score += f.points;
              spark(f.x + f.w/2, f.y + f.h/2);
              c.happyT = 0.45;
              bleepCatch(f.type);
              if (currentLimitTB() === Infinity) pulseBar();
            }
            f.dead = true;
            break;
          }
        }
      }
      game.files = game.files.filter(f => !f.dead && f.y < H + 20);

      // Sparkles
      for (const s of game.sparkles) { s.t += dt; s.y -= 30*dt; }
      game.sparkles = game.sparkles.filter(s => s.t < 0.5);

      // Rain (visual)
      for (const r of game.rainDrops) { r.y += r.vy * 60 * dt; r.life -= dt; }
      game.rainDrops = game.rainDrops.filter(r => r.life > 0 && r.y < H);
      // continuously emit rain while any cloud frozen
      for (const c of clouds) {
        if (c.frozen && Math.random() < 0.55) spawnRain(2, c);
      }

      // Tier mechanics
      const tb = game.score / POINTS_PER_TB;
      if (game.tier === 'unlimited' && !game.switchedToPro) {
        if (tb >= 6 && !game.shownUnlimitedUpgrade) {
          game.shownUnlimitedUpgrade = true;
          game.state = STATE.UPGRADE;
          game.promptIndex = 0;
        }
      }

      const effectiveLimit = currentLimitTB();
      if (effectiveLimit !== Infinity && tb >= effectiveLimit) {
        if (game.state === STATE.PLAY) {
          game.state = STATE.FULL;
          game.promptIndex = 0;
        }
      }
    }

    if (game.state === STATE.FULL) {
      game.spawnT += dt;
      if (game.spawnT > 0.45) { game.spawnT = 0; spawn(); }
      for (const f of game.files) f.y += f.vy * 60 * dt;
      game.files = game.files.filter(f => f.y < H + 20);
    }

    if (game.state === STATE.COUNTDOWN) {
      game.countdownT += dt;
      if (game.countdownT >= 1) {
        game.countdownT = 0;
        game.countdown -= 1;
        if (game.countdown <= 0) {
          game.state = STATE.PLAY;
          last = performance.now();
        }
      }
    }
  }

  function spawnRain(n, c){
    c = c || game.cloud;
    for (let i=0;i<n;i++){
      game.rainDrops.push({
        x: c.x + 4 + Math.random()*(c.w-8),
        y: c.y + c.h - 2,
        vy: 0.8 + Math.random()*0.6,
        life: 0.8 + Math.random()*0.4,
      });
    }
  }
  function tickCloud(c, dt){
    if (c.frozen) {
      c.freezeT -= dt;
      if (c.freezeT <= 0) { c.frozen = false; }
    }
    if (c.happyT > 0) c.happyT = Math.max(0, c.happyT - dt);
  }

  function currentLimitTB() {
    if (!game.tier) return Infinity;
    if (game.switchedToPro) return TIERS.pro.limitTB;
    return TIERS[game.tier].limitTB;
  }
  function currentBg() {
    if (!game.tier) return 'mountain';
    if (game.switchedToPro) return 'office';
    return TIERS[game.tier].bg;
  }

  function moveCloud1(dt) {
    const tb = game.score / POINTS_PER_TB;
    let stepDivisor = 1;
    if (game.tier === 'unlimited' && !game.switchedToPro) {
      if (tb >= 6) stepDivisor = 3;
      else if (tb >= 5) stepDivisor = 2;
    }
    if (stepDivisor === 1) {
      if (keys.left)  game.cloud.x -= game.cloud.speed * 60 * dt;
      if (keys.right) game.cloud.x += game.cloud.speed * 60 * dt;
      leftPresses = 0; rightPresses = 0;
    } else {
      const STEP = 12;
      if (leftPresses >= stepDivisor)  { game.cloud.x -= STEP; leftPresses = 0; }
      if (rightPresses >= stepDivisor) { game.cloud.x += STEP; rightPresses = 0; }
    }
    game.cloud.x = Math.max(0, Math.min(W - game.cloud.w, game.cloud.x));
  }
  function moveCloud2(dt) {
    if (keys2.left)  game.cloud2.x -= game.cloud2.speed * 60 * dt;
    if (keys2.right) game.cloud2.x += game.cloud2.speed * 60 * dt;
    game.cloud2.x = Math.max(0, Math.min(W - game.cloud2.w, game.cloud2.x));
  }

  function spark(x,y){
    for (let i=0;i<6;i++){
      game.sparkles.push({ x: x + (Math.random()*8-4), y: y + (Math.random()*4-2), t:0 });
    }
  }
  function moodOf(c){
    if (c.frozen) return 'sad';
    if (c.happyT > 0) return 'happy';
    return 'normal';
  }

  // ---------- Render ----------
  function render() {
    if (game.state === STATE.WELCOME || game.state === STATE.SUBHELP) {
      // Solid pastel canvas behind the welcome dialog
      rect(0,0,W,H, PAL.welcomeBg);
    } else {
      drawBackground(currentBg());
    }

    // Files
    for (const f of game.files) drawFile(f);

    // Rain
    for (const r of game.rainDrops) {
      ctx.globalAlpha = Math.max(0, Math.min(1, r.life));
      rect(r.x|0, r.y|0, 1, 3, PAL.rain);
      ctx.globalAlpha = 1;
    }

    // Cloud(s)
    const tb = game.score / POINTS_PER_TB;
    let slow = 0;
    if (game.tier === 'unlimited' && !game.switchedToPro) {
      if (tb >= 6) slow = 2;
      else if (tb >= 5) slow = 1;
    }
    if (game.state !== STATE.WELCOME && game.state !== STATE.SUBHELP) {
      const m1 = moodOf(game.cloud);
      drawCloud(game.cloud.x, game.cloud.y, slow, m1);
      if (game.cloud2) {
        const m2 = moodOf(game.cloud2);
        drawSmallCloud(game.cloud2.x, game.cloud2.y, m2);
      }
    }

    // Sparkles
    for (const s of game.sparkles) {
      ctx.globalAlpha = 1 - s.t/0.5;
      rect(s.x, s.y, 2, 2, '#fff5e1');
      ctx.globalAlpha = 1;
    }

    // HUD + dialog visibility
    syncHud();
    syncDialog();
  }

  function syncHud(){
    const playing = game.state === STATE.PLAY || game.state === STATE.PAUSE
                  || game.state === STATE.FULL || game.state === STATE.UPGRADE
                  || game.state === STATE.CALL_CS || game.state === STATE.COUNTDOWN;
    hud.hidden = !playing;
    // Update hint bar
    if (isMulti() && playing) {
      hintEl.innerHTML =
        '<span class="key">P1</span> <span class="arrow">◄</span><span class="arrow">►</span> ' +
        '<span class="key">P2</span> <span class="key">A</span><span class="key">D</span> • ' +
        '<span class="key">ENTER</span> PAUSE • ' +
        '<span class="key">SPACE</span> SELECT';
    } else {
      hintEl.innerHTML =
        '<span class="arrow">◄</span><span class="arrow">►</span> ' +
        '<span class="key">MOVE</span> • ' +
        '<span class="key">ENTER</span> PAUSE • ' +
        '<span class="key">SPACE</span> SELECT';
    }
    if (!playing) return;

    const tb = game.score / POINTS_PER_TB;
    const tierName = game.switchedToPro ? 'PRO • 10 TB (auto-switched)' :
                     (game.tier ? TIERS[game.tier].name : '—');
    tierEl.textContent = tierName;
    tbEl.textContent   = `${tb.toFixed(2)} TB`;

    const limit = currentLimitTB();
    // Update bar
    if (limit !== Infinity) {
      barFill.classList.remove('indeterminate');
      const p = Math.min(1, tb / limit);
      barFill.style.width = (p*100).toFixed(1) + '%';
      barFill.style.background =
        p < 0.7 ? 'var(--ok)' : (p < 0.95 ? 'var(--warn)' : 'var(--bad)');
      barLabel.textContent = `STORAGE • ${tb.toFixed(2)} / ${limit} TB`;
      [...barEl.querySelectorAll('.bar-tick')].forEach(n => n.remove());
      tbEl.textContent = `${tb.toFixed(2)} TB`;
      tbEl.style.visibility = '';
    } else {
      // Unlimited: bar doesn't fill, just shimmers; TB still counts visibly
      barFill.style.width = '';                // managed by CSS
      barFill.style.background = '';
      barFill.classList.add('indeterminate');
      const slowState = tb >= 6 ? ' • slowing down' :
                        tb >= 5 ? ' • cloud heavy'  : '';
      barLabel.textContent = `STORAGE • ${tb.toFixed(2)} TB / UNLIMITED${slowState}`;
      [...barEl.querySelectorAll('.bar-tick')].forEach(n => n.remove());
      tbEl.textContent = `${tb.toFixed(2)} TB`;
      tbEl.style.visibility = '';
    }
  }

  function pulseBar(){
    if (!barFill.classList.contains('indeterminate')) return;
    barFill.classList.remove('pulse');
    void barFill.offsetWidth;
    barFill.classList.add('pulse');
    setTimeout(() => barFill.classList.remove('pulse'), 260);
  }

  function syncDialog(){
    const s = game.state;
    if (s === STATE.PLAY) { dialog.classList.add('hidden'); return; }
    dialog.classList.remove('hidden');

    if (s === STATE.WELCOME) renderWelcomeUI();
    else if (s === STATE.COUNTDOWN) renderCountdownUI();
    else if (s === STATE.PAUSE) renderPauseUI();
    else if (s === STATE.FULL) renderFullUI();
    else if (s === STATE.UPGRADE) renderUpgradeUI();
    else if (s === STATE.CALL_CS) renderCallCS_UI();
    else if (s === STATE.SUBHELP) renderSubhelpUI();
  }

  // ---------- Dialog UI builders ----------
  function renderWelcomeUI(){
    ensureCard();
    const opts = [
      { key:'home',      label:'HOME • 1 TB',          subtle:false },
      { key:'home5',     label:'HOME • 5 TB (family)', subtle:false },
      { key:'pro',       label:'PRO • 10 TB',          subtle:false },
      { key:'unlimited', label:'UNLIMITED',            subtle:false },
      { key:'help',      label:"can't find your subscription?", subtle:true },
    ];
    card.innerHTML = `
      <h1>JOTTACLOUD CATCHER</h1>
      <div class="sub">catch your files. fill the cloud.<br>watch out for pirated stuff.</div>
      <div class="opts">
        ${opts.map((o,i) => `
          <div class="opt ${o.subtle?'subtle ':''}${i===game.welcomeIndex?'sel':''}"
               data-i="${i}" data-action="welcome">${o.label}</div>
        `).join('')}
      </div>
      <div class="footer">↑ ↓ choose • space / enter to start</div>
    `;
    attachClicks('welcome');
  }

  function renderSubhelpUI(){
    ensureCard();
    card.innerHTML = `
      <h1 style="color:var(--accent)">NEED A DIFFERENT PLAN?</h1>
      <div class="sub" style="line-height:1.9">
        visit <a href="https://www.jottacloud.com" target="_blank" rel="noopener">jottacloud.com</a><br>
        for the full plan selection.
      </div>
      <div class="opts">
        <div class="opt sel" data-i="0" data-action="subhelp">BACK</div>
      </div>
    `;
    attachClicks('subhelp');
  }

  function renderCountdownUI(){
    const n = Math.max(1, game.countdown);
    card.style.display = 'none';
    if (!dialog.querySelector('.cd')) {
      dialog.innerHTML = `<div class="cd" style="text-align:center">
        <div class="countdown-num" id="cdn">${n}</div>
        <div class="countdown-sub">GET READY</div>
      </div>`;
    } else {
      dialog.querySelector('#cdn').textContent = n;
    }
  }

  function renderPauseUI(){
    ensureCard();
    card.innerHTML = `
      <h1 style="color:var(--accent)">PAUSED</h1>
      <div class="sub" style="line-height:1.9">
        with <span style="color:var(--accent)">jottacloud</span>, you don't have to pause.<br>
        we take care of your files.
      </div>
      <div class="opts">
        <div class="opt ${game.promptIndex===0?'sel':''}" data-i="0" data-action="pause">RESUME</div>
        <div class="opt ${game.promptIndex===1?'sel':''}" data-i="1" data-action="pause">BACK TO WELCOME</div>
      </div>
      <div class="footer">↑ ↓ choose • enter / space to confirm • esc to resume</div>
    `;
    attachClicks('pause');
  }

  function renderFullUI(){
    ensureCard();
    const tb = (game.score/POINTS_PER_TB).toFixed(2);
    card.innerHTML = `
      <h1 class="bad">STORAGE FULL!</h1>
      <div class="sub">you stored <strong>${tb} TB</strong></div>
      <div class="opts">
        <div class="opt ${game.promptIndex===0?'sel':''}" data-i="0" data-action="full">UPGRADE?</div>
        <div class="opt ${game.promptIndex===1?'sel':''}" data-i="1" data-action="full">play again</div>
      </div>
    `;
    attachClicks('full');
  }

  function renderUpgradeUI(){
    ensureCard();
    card.innerHTML = `
      <h1 style="color:var(--accent)">UPGRADE SUBSCRIPTION?</h1>
      <div class="sub">your cloud is getting sluggish.<br>switch to <strong>PRO</strong> for full speed.</div>
      <div class="opts">
        <div class="opt ${game.promptIndex===0?'sel':''}" data-i="0" data-action="upgrade">YES, switch to PRO</div>
        <div class="opt ${game.promptIndex===1?'sel':''}" data-i="1" data-action="upgrade">no, keep going</div>
      </div>
    `;
    attachClicks('upgrade');
  }

  function renderCallCS_UI(){
    ensureCard();
    card.innerHTML = `
      <h1>PLEASE CALL<br>CUSTOMER SERVICE</h1>
      <div class="sub">we have plans bigger than 10 TB.</div>
      <div class="opts">
        <div class="opt sel" data-i="0" data-action="callcs">play again</div>
      </div>
    `;
    attachClicks('callcs');
  }

  function ensureCard(){
    if (!dialog.contains(card)) {
      dialog.innerHTML = '';
      dialog.appendChild(card);
    }
    card.style.display = '';
  }

  function attachClicks(action){
    card.querySelectorAll('.opt').forEach(el => {
      el.onclick = () => {
        const i = +el.dataset.i;
        if (action === 'welcome') { game.welcomeIndex = i; uiSelect(); }
        else { game.promptIndex = i; uiSelect(); }
      };
    });
  }

  // ---------- UI nav ----------
  function uiNav(dir){
    if (game.state === STATE.WELCOME) game.welcomeIndex = (game.welcomeIndex + dir + 5) % 5;
    else if (game.state === STATE.PAUSE)   game.promptIndex = (game.promptIndex + dir + 2) % 2;
    else if (game.state === STATE.FULL)    game.promptIndex = (game.promptIndex + dir + 2) % 2;
    else if (game.state === STATE.UPGRADE) game.promptIndex = (game.promptIndex + dir + 2) % 2;
  }
  function resetToWelcome(){
    game = freshGame();
    ensureCard();
    syncHud();
    syncDialog();
  }
  function uiSelect(){
    if (game.state === STATE.WELCOME) {
      if (game.welcomeIndex === 4) { game.state = STATE.SUBHELP; return; }
      const tier = ['home','home5','pro','unlimited'][game.welcomeIndex];
      startGame(tier);
    } else if (game.state === STATE.SUBHELP) {
      game.state = STATE.WELCOME;
    } else if (game.state === STATE.COUNTDOWN) {
      // ignore
    } else if (game.state === STATE.PAUSE) {
      if (game.promptIndex === 0) togglePause();           // resume
      else { resetToWelcome(); }                            // back to welcome
    } else if (game.state === STATE.FULL) {
      if (game.promptIndex === 0) {
        if (game.tier === 'pro' || game.switchedToPro) game.state = STATE.CALL_CS;
        else game = freshGame();
      } else { resetToWelcome(); }
    } else if (game.state === STATE.UPGRADE) {
      if (game.promptIndex === 0) { game.switchedToPro = true; game.state = STATE.PLAY; }
      else { game.state = STATE.PLAY; }
    } else if (game.state === STATE.CALL_CS) {
      resetToWelcome();
    }
  }

  function togglePause(){
    if (game.state === STATE.PLAY) { game.state = STATE.PAUSE; game.promptIndex = 0; }
    else if (game.state === STATE.PAUSE) { game.state = STATE.PLAY; last = performance.now(); }
  }

  function startGame(tier){
    game = freshGame();
    game.tier = tier;
    game.state = STATE.COUNTDOWN;
    game.countdown = 5;
    game.countdownT = 0;
    if (TIERS[tier].multi) {
      // Position parent cloud-left, child cloud-right
      game.cloud.x = W/2 - 50;
      game.cloud2 = {
        x: W/2 + 18, y: H - 32,
        w: 24, h: 12, speed: 1.6,
        frozen:false, freezeT:0, happyT:0,
      };
    }
  }

  // initial dialog (welcome) renders on first frame
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
